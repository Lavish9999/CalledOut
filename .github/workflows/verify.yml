name: Verify CalledOut

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: calledout-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: Mobile and admin
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci_publishable_key_00000000000000000000000000000000
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: ci_publishable_key_00000000000000000000000000000000
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck lint test and build
        run: npm run verify

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  database:
    name: Database migrations and pgTAP
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Start a fresh local database
        run: supabase db start

      - name: Capture database behavior test output
        id: database-check
        shell: bash
        run: |
          set +e
          supabase test db > database-test.log 2>&1
          status=$?
          cat database-test.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload database diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-test-log
          path: database-test.log
          if-no-files-found: error

      - name: Fail when database behavior tests fail
        if: steps.database-check.outputs.status != '0'
        run: exit 1

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup

  edge-functions:
    name: Edge Function type safety
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Capture Edge Function typecheck output
        id: edge-check
        shell: bash
        run: |
          set +e
          : > edge-function-check.log
          status=0
          while IFS= read -r -d '' file; do
            echo "===== $file =====" | tee -a edge-function-check.log
            deno check "$file" >> edge-function-check.log 2>&1
            current=$?
            if [ "$current" -ne 0 ]; then
              status=1
            fi
          done < <(find supabase/functions -name index.ts -print0 | sort -z)
          cat edge-function-check.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Edge Function diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edge-function-check-log
          path: edge-function-check.log
          if-no-files-found: error

      - name: Fail when Edge Function typechecking fails
        if: steps.edge-check.outputs.status != '0'
        run: exit 1
