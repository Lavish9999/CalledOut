name: Verify CalledOut

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: calledout-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: Mobile and admin
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci_publishable_key_00000000000000000000000000000000
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: ci_publishable_key_00000000000000000000000000000000
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck lint test and build
        run: npm run verify

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  database:
    name: Database migrations and pgTAP
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Start a fresh local database
        run: supabase db start

      - name: Run all database behavior tests
        run: supabase test db

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup

  edge-functions:
    name: Edge Function type safety
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Typecheck every Edge Function
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            deno check "$file"
          done < <(find supabase/functions -name index.ts -print0 | sort -z)
