appId: com.calledout.app
name: Circle, Wall, reactions, and redemption
---
- launchApp
- tapOn: "CIRCLES"
- tapOn: "Create"
- tapOn: "Circle name"
- inputText: "Receipts Only"
- tapOn: "Create private circle"
- assertVisible: "Receipts Only"
- tapOn: "Receipts Only"
- assertVisible: "INVITE CODE"
- tapOn: "Open Wall"
- assertVisible: "The Wall"
# The CI fixture advances a visible circle commitment through the deadline job.
- assertVisible: "LATEST RECEIPT"
- tapOn: "We saw that."
- tapOn: "Answer the miss"
- assertVisible: "Answer the miss"
- tapOn: "Start 24-hour redemption"
- assertVisible: "ON THE CLOCK"
